<!-- ============================================================
     FILE: base.html
     Layout base dos e-mails Fórmula da Beleza.
     Identidade visual: Preto, Vermelho, Branco. Visual moderno,
     bordas arredondadas.
     ============================================================ -->
<!DOCTYPE html>
<html lang="pt-BR" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="format-detection" content="telephone=no,date=no,address=no,email=no">
    <meta name="x-apple-disable-message-reformatting">
    <title>{% block title %}Fórmula da Beleza{% endblock %}</title>

    <!--[if mso]>
    <noscript>
        <xml>
            <o:OfficeDocumentSettings>
                <o:PixelsPerInch>96</o:PixelsPerInch>
            </o:OfficeDocumentSettings>
        </xml>
    </noscript>
    <![endif]-->

    <style>
        /* ── Reset ─────────────────────────────────────────────── */
        * { box-sizing: border-box; }
        body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
        table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
        img { -ms-interpolation-mode: bicubic; border: 0; display: block; outline: none; text-decoration: none; }
        body {
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            font-family: Arial, Helvetica, sans-serif;
        }

        /* ── Preheader ─────────────────────────────────────────── */
        .preheader {
            display: none !important;
            visibility: hidden;
            mso-hide: all;
            font-size: 1px;
            line-height: 1px;
            max-height: 0;
            max-width: 0;
            opacity: 0;
            overflow: hidden;
        }

        /* ── Wrapper ───────────────────────────────────────────── */
        .email-wrapper {
            background-color: #f2f2f2;
            width: 100%;
            padding: 48px 16px;
        }

        /* ── Card ──────────────────────────────────────────────── */
        .email-card {
            background-color: #ffffff;
            border-radius: 28px;
            overflow: hidden;
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            box-shadow: 0 24px 60px rgba(0,0,0,0.12);
        }

        /* ── Header ────────────────────────────────────────────── */
        .header {
            background: #0a0a0a;
            padding: 40px 40px 30px;
            text-align: center;
        }

        .logo-badge {
            display: inline-block;
            width: 56px;
            height: 56px;
            border-radius: 18px;
            background: linear-gradient(135deg, #e2222f 0%, #a8121c 100%);
            margin: 0 auto 18px;
            line-height: 56px;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 900;
            font-style: italic;
            font-size: 22px;
            color: #ffffff;
            text-align: center;
        }

        .logo-title {
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 900;
            font-size: 26px;
            color: #ffffff;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin: 0;
            line-height: 1.2;
            font-style: italic;
        }

        .logo-title span {
            color: #e2222f;
        }

        .header-tagline {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 10px;
            font-weight: 700;
            color: rgba(255,255,255,0.45);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 10px 0 0;
        }

        .header-stripe {
            display: block;
            width: 56px;
            height: 4px;
            border-radius: 4px;
            background: #d81e2a;
            margin: 22px auto 0;
        }

        /* ── Body ──────────────────────────────────────────────── */
        .body-cell {
            padding: 40px 44px 44px;
            background-color: #ffffff;
        }

        /* ── Content blocks (usados pelos templates filhos) ────── */
        .section-label {
            display: inline-block;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 10px;
            font-weight: 700;
            color: #d81e2a;
            background: #fdecec;
            padding: 5px 12px;
            border-radius: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0 0 16px;
        }

        .heading {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 26px;
            font-weight: 900;
            color: #0a0a0a;
            margin: 0 0 22px;
            line-height: 1.3;
        }

        .greeting {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 15px;
            color: #1a1a1a;
            margin: 0 0 10px;
            line-height: 1.7;
        }

        .greeting strong {
            color: #d81e2a;
        }

        .body-text {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 15px;
            color: #5a5a5a;
            margin: 0 0 28px;
            line-height: 1.75;
        }

        .info-box {
            background: #fafafa;
            border-radius: 18px;
            padding: 20px 24px;
            margin-bottom: 28px;
        }

        .info-box-title {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 12px;
            font-weight: 700;
            color: #0a0a0a;
            letter-spacing: 0.5px;
            margin: 0 0 8px;
        }

        .info-box-text {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 14px;
            color: #6a6a6a;
            margin: 0;
            line-height: 1.75;
        }

        .cta-wrap {
            text-align: center;
            margin: 8px 0 26px;
        }

        .cta-btn {
            display: inline-block;
            background: #d81e2a;
            color: #ffffff !important;
            text-decoration: none !important;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.5px;
            padding: 17px 56px;
            border-radius: 100px;
            box-shadow: 0 10px 24px rgba(216,30,42,0.3);
        }

        .link-fallback {
            text-align: center;
            margin-bottom: 28px;
        }

        .link-fallback p {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 12px;
            color: #aaaaaa;
            margin: 0 0 8px;
        }

        .link-fallback a {
            display: inline-block;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 12px;
            color: #a8121c;
            background: #fafafa;
            border-radius: 12px;
            padding: 10px 16px;
            word-break: break-all;
            text-decoration: none;
        }

        .warning-box {
            background: #fafafa;
            border-radius: 18px;
            padding: 18px 22px;
        }

        .warning-box p {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 13px;
            color: #6a6a6a;
            margin: 0;
            line-height: 1.7;
        }

        .warning-box strong {
            color: #0a0a0a;
        }

        /* ── Footer ────────────────────────────────────────────── */
        .footer {
            background: #0a0a0a;
            padding: 32px 40px;
            text-align: center;
        }

        .footer-logo {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 14px;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-style: italic;
            margin: 0;
        }

        .footer-logo span { color: #d81e2a; }

        .footer-tagline {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 2px;
            margin: 8px 0 0;
        }

        .footer-divider {
            width: 32px;
            height: 1px;
            background: rgba(255,255,255,0.12);
            margin: 18px auto;
            border: none;
        }

        .footer-auto {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 11px;
            color: rgba(255,255,255,0.25);
            margin: 0;
            letter-spacing: 0.5px;
        }

        /* ── Mobile ────────────────────────────────────────────── */
        @media only screen and (max-width: 600px) {
            .email-wrapper { padding: 20px 10px !important; }
            .email-card { border-radius: 20px !important; }
            .header { padding: 30px 24px 24px !important; }
            .logo-title { font-size: 22px !important; }
            .body-cell { padding: 28px 24px 32px !important; }
            .heading { font-size: 22px !important; }
            .cta-btn { display: block !important; padding: 17px 24px !important; }
            .footer { padding: 26px 24px !important; }
        }

        /* ── Dark mode ─────────────────────────────────────────── */
        @media (prefers-color-scheme: dark) {
            .email-wrapper { background-color: #050505 !important; }
            .email-card { background-color: #141414 !important; box-shadow: 0 24px 60px rgba(0,0,0,0.6) !important; }
            .body-cell { background-color: #141414 !important; }
            .heading { color: #f2f2f2 !important; }
            .greeting { color: #e8e8e8 !important; }
            .body-text { color: #b0b0b0 !important; }
            .info-box, .warning-box { background: #1e1e1e !important; }
            .info-box-text, .warning-box p { color: #b0b0b0 !important; }
            .warning-box strong { color: #f2f2f2 !important; }
            .link-fallback a { background: #1e1e1e !important; }
        }
    </style>

    {% block extra_styles %}{% endblock %}
</head>

<body>

<span class="preheader">{% block preheader %}Fórmula da Beleza – confirme seu e-mail{% endblock %}</span>

<div class="email-wrapper">
    <div class="email-card">

        <!-- ── HEADER ─────────────────────────────────────────── -->
        <div class="header">
            <div class="logo-badge">FB</div>
            <p class="logo-title">Fórmula<span> da Beleza</span></p>
            <p class="header-tagline">Salão &amp; Barbearia</p>
            <span class="header-stripe"></span>
        </div>

        <!-- ── BODY (child template) ──────────────────────────── -->
        <div class="body-cell">
            {% block content %}{% endblock %}
        </div>

        <!-- ── FOOTER ─────────────────────────────────────────── -->
        <div class="footer">
            <p class="footer-logo">Fórmula<span> da Beleza</span></p>
            <p class="footer-tagline">Onde seu estilo ganha forma</p>
            <hr class="footer-divider">
            <p class="footer-auto">Mensagem automática. Não responda este e-mail.</p>
        </div>

    </div>
</div>

</body>
</html>
