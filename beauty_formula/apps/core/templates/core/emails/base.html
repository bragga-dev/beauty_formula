<!-- ============================================================
     FILE: base.html
     Layout base dos e-mails Fórmula da Beleza.
     Identidade visual: Preto, Vermelho, Branco.
     ============================================================ -->
<!DOCTYPE html>
<html lang="pt-BR" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="format-detection" content="telephone=no,date=no,address=no,email=no">
    <meta name="x-apple-disable-message-reformatting">
    <title>{% block title %}Fórmula da Beleza{% endblock %}</title>

    <!--[if mso]>
    <noscript>
        <xml>
            <o:OfficeDocumentSettings>
                <o:PixelsPerInch>96</o:PixelsPerInch>
            </o:OfficeDocumentSettings>
        </xml>
    </noscript>
    <![endif]-->

    <style>
        /* ── Reset ─────────────────────────────────────────────── */
        * { box-sizing: border-box; }
        body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
        table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
        img { -ms-interpolation-mode: bicubic; border: 0; display: block; outline: none; text-decoration: none; }
        body {
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            font-family: Arial, Helvetica, sans-serif;
        }

        /* ── Preheader ─────────────────────────────────────────── */
        .preheader {
            display: none !important;
            visibility: hidden;
            mso-hide: all;
            font-size: 1px;
            line-height: 1px;
            max-height: 0;
            max-width: 0;
            opacity: 0;
            overflow: hidden;
        }

        /* ── Wrapper ───────────────────────────────────────────── */
        .email-wrapper {
            background-color: #0a0a0a;
            width: 100%;
            padding: 48px 16px;
        }

        /* ── Card ──────────────────────────────────────────────── */
        .email-card {
            background-color: #ffffff;
            border-radius: 14px;
            overflow: hidden;
            max-width: 620px;
            width: 100%;
            margin: 0 auto;
            box-shadow: 0 32px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(216,30,42,0.15);
        }

        /* ── Header ────────────────────────────────────────────── */
        .header {
            background: #0a0a0a;
            padding: 36px 40px 26px;
            text-align: center;
        }

        .header-stripe {
            display: block;
            width: 100%;
            height: 4px;
            background: repeating-linear-gradient(
                -45deg,
                #d81e2a 0px, #d81e2a 10px,
                #ffffff 10px, #ffffff 12px,
                #d81e2a 12px, #d81e2a 22px
            );
        }

        .logo-title {
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 900;
            font-size: 30px;
            color: #ffffff;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0;
            line-height: 1.1;
            font-style: italic;
        }

        .logo-title span {
            color: #e2222f;
        }

        .header-tagline {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 10px;
            font-weight: 700;
            color: rgba(255,255,255,0.5);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 10px 0 0;
        }

        /* ── Body ──────────────────────────────────────────────── */
        .body-cell {
            padding: 36px 44px 44px;
            background-color: #ffffff;
        }

        /* ── Content blocks (usados pelos templates filhos) ────── */
        .section-label {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 10px;
            font-weight: 700;
            color: #d81e2a;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin: 0 0 12px;
        }

        .heading {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 26px;
            font-weight: 900;
            color: #0a0a0a;
            margin: 0 0 6px;
            line-height: 1.3;
        }

        .divider {
            width: 40px;
            height: 3px;
            background: #d81e2a;
            margin: 16px 0 24px;
            border: none;
        }

        .greeting {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 15px;
            color: #1a1a1a;
            margin: 0 0 10px;
            line-height: 1.7;
        }

        .greeting strong {
            color: #d81e2a;
        }

        .body-text {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 15px;
            color: #4a4a4a;
            margin: 0 0 28px;
            line-height: 1.75;
        }

        .info-box {
            background: #faf5f5;
            border-left: 3px solid #d81e2a;
            border-radius: 0 10px 10px 0;
            padding: 18px 22px;
            margin-bottom: 32px;
        }

        .info-box-title {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 12px;
            font-weight: 700;
            color: #0a0a0a;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin: 0 0 8px;
        }

        .info-box-text {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 14px;
            color: #5a5a5a;
            margin: 0;
            line-height: 1.75;
        }

        .cta-wrap {
            text-align: center;
            margin: 8px 0 24px;
        }

        .cta-btn {
            display: inline-block;
            background: #d81e2a;
            color: #ffffff !important;
            text-decoration: none !important;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 16px 52px;
            border-radius: 6px;
            box-shadow: 0 6px 24px rgba(216,30,42,0.35);
        }

        .link-fallback {
            text-align: center;
            margin-bottom: 28px;
        }

        .link-fallback p {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 12px;
            color: #999999;
            margin: 0 0 6px;
        }

        .link-fallback a {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 12px;
            color: #a8121c;
            word-break: break-all;
            text-decoration: underline;
        }

        .warning-box {
            background: #fafafa;
            border: 1px solid #e0e0e0;
            border-left: 3px solid #0a0a0a;
            border-radius: 8px;
            padding: 16px 20px;
        }

        .warning-box p {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 13px;
            color: #4a4a4a;
            margin: 0;
            line-height: 1.7;
        }

        .warning-box strong {
            color: #0a0a0a;
        }

        /* ── Footer ────────────────────────────────────────────── */
        .footer {
            background: #0a0a0a;
            padding: 28px 40px;
            text-align: center;
        }

        .footer-logo {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 15px;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-style: italic;
            margin: 0;
        }

        .footer-logo span { color: #d81e2a; }

        .footer-tagline {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 2.5px;
            text-transform: uppercase;
            margin: 8px 0 0;
        }

        .footer-divider {
            width: 32px;
            height: 1px;
            background: rgba(216,30,42,0.4);
            margin: 14px auto;
            border: none;
        }

        .footer-auto {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 11px;
            color: rgba(255,255,255,0.25);
            margin: 0;
            letter-spacing: 0.5px;
        }

        /* ── Mobile ────────────────────────────────────────────── */
        @media only screen and (max-width: 600px) {
            .email-wrapper { padding: 24px 12px !important; }
            .header { padding: 28px 24px 22px !important; }
            .logo-title { font-size: 24px !important; letter-spacing: 1px !important; }
            .body-cell { padding: 26px 22px 32px !important; }
            .heading { font-size: 22px !important; }
            .cta-btn { display: block !important; padding: 16px 24px !important; font-size: 14px !important; }
            .footer { padding: 24px 22px !important; }
        }

        @media only screen and (max-width: 400px) {
            .body-cell { padding: 18px 14px 24px !important; }
            .logo-title { font-size: 20px !important; }
        }

        /* ── Dark mode ─────────────────────────────────────────── */
        @media (prefers-color-scheme: dark) {
            .email-wrapper { background-color: #000000 !important; }
            .email-card { background-color: #141414 !important; box-shadow: 0 32px 80px rgba(0,0,0,0.7) !important; }
            .body-cell { background-color: #141414 !important; }
            .heading { color: #f2f2f2 !important; }
            .greeting { color: #e8e8e8 !important; }
            .body-text { color: #b0b0b0 !important; }
            .info-box { background: #1f1414 !important; }
            .info-box-text { color: #b0b0b0 !important; }
            .warning-box { background: #1a1a1a !important; border-color: #2a2a2a !important; }
            .warning-box p { color: #c0c0c0 !important; }
        }
    </style>

    {% block extra_styles %}{% endblock %}
</head>

<body>

<span class="preheader">{% block preheader %}Fórmula da Beleza – confirme seu e-mail{% endblock %}</span>

<div class="email-wrapper">
    <div class="email-card">

        <!-- ── HEADER ─────────────────────────────────────────── -->
        <div class="header">
            <p class="logo-title">Fórmula<span> da Beleza</span></p>
            <p class="header-tagline">Salão &amp; Barbearia</p>
        </div>
        <span class="header-stripe"></span>

        <!-- ── BODY (child template) ──────────────────────────── -->
        <div class="body-cell">
            {% block content %}{% endblock %}
        </div>

        <!-- ── FOOTER ─────────────────────────────────────────── -->
        <div class="footer">
            <p class="footer-logo">Fórmula<span> da Beleza</span></p>
            <p class="footer-tagline">Onde seu estilo ganha forma</p>
            <hr class="footer-divider">
            <p class="footer-auto">Mensagem automática. Não responda este e-mail.</p>
        </div>

    </div>
</div>

</body>
</html>
