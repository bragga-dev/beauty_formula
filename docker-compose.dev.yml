services:

  # =========================================================
  # RABBITMQ
  # =========================================================
  rabbitmq:
    image: rabbitmq:4-management
    restart: unless-stopped
    hostname: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"     
      - "15672:15672"   
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./infra/rabbitmq/permit-deprecated.conf:/etc/rabbitmq/conf.d/10-deprecated-features.conf:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================================================
  # DJANGO
  # =========================================================
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
      setup-minio:
        condition: service_completed_successfully

  # =========================================================
  # POSTGRES
  # =========================================================
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # =========================================================
  # REDIS
  # =========================================================
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  # =========================================================
  # CELERY WORKER
  # =========================================================
  celery:
    build: .
    command: celery -A beauty_formula.config worker -l info
    working_dir: /app
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      setup-minio:
        condition: service_completed_successfully

  # =========================================================
  # CELERY BEAT
  # =========================================================
  celery-beat:
    build: .
    command: celery -A beauty_formula.config beat -l info
    working_dir: /app
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # =========================================================
  # MINIO
  # =========================================================
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================================================
  # SETUP MINIO
  # Cria buckets, usuário IAM, política e faz upload dos defaults.
  # A política vem de ./infra/minio/app-policy.json (sem heredoc).
  # =========================================================
  setup-minio:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./default:/default
      - ./infra/minio/app-policy.json:/policy/app-policy.json:ro
    env_file:
      - .env
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -e

        # ── 1. Conectar como root ──────────────────────────────────
        mc alias set local http://minio:9000 \
          "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"

        # ── 2. Criar buckets ───────────────────────────────────────
        mc mb --ignore-existing local/"$MINIO_BUCKET_MEDIA"
        mc mb --ignore-existing local/"$MINIO_BUCKET_STATIC"
        mc mb --ignore-existing local/"$MINIO_BUCKET_PRIVATE"

        # ── 3. Políticas públicas (static e media) ─────────────────
        mc anonymous set download local/"$MINIO_BUCKET_STATIC"
        mc anonymous set download local/"$MINIO_BUCKET_MEDIA"

        # ── 4. Usuário IAM dedicado (idempotente) ──────────────────
        mc admin user add local "$MINIO_APP_USER" "$MINIO_APP_PASSWORD" || true

        # ── 5. Política de acesso restrito (lida do arquivo) ────────
        mc admin policy create local beauty_formula-app-policy \
          /policy/app-policy.json || true

        mc admin policy attach local beauty_formula-app-policy \
          --user "$MINIO_APP_USER"

        # ── 6. Upload de arquivos padrão ───────────────────────────
        mc cp /default/client_img.jpg local/"$MINIO_BUCKET_MEDIA"/default/client_img.jpg
        mc cp /default/employee_img.jpeg   local/"$MINIO_BUCKET_MEDIA"/default/employee_img.jpeg

        echo "✅ MinIO setup concluído"

# =========================================================
# VOLUMES
# =========================================================
volumes:
  postgres_data:
  minio_data:
  rabbitmq_data: